<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body
        {
            background-color: #000;
            position: relative;
        }
        button{
           position: absolute;
          top: 50vw;
           left: 50%;
           padding:16px 36px;
        font-size: 45px;
        background-color: transparent;
        color: white;
        border: 1px solid ;
        ;
        border-color: red;
        
    }
    button:hover{
            animation: button 1s  linear  infinite alternate;

        }
        @keyframes 
        button {
            0%{
                rotate: 20deg;
            }
             50%{
                rotate: 0deg;
            }
             100%{
                rotate: -20deg;
            }
        }
    </style>
</head>
<body>
    <button type="button">Click me</button>
</body>
</html>
